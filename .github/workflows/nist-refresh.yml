# Weekly refresh of the NIST CSRC glossary.
# Downloads the official JSON export, merges with local data,
# enriches abbreviation-only terms, and commits any changes.
# The pages.yml workflow auto-deploys on push to main.
name: NIST Glossary Refresh

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC
  workflow_dispatch:         # Manual trigger via Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run NIST glossary refresh
        run: node scripts/refresh-nist-glossary.js || true

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/nist-glossary.json data/nist-glossary-meta.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nist-glossary.json data/nist-glossary-meta.json
          git commit -m "chore: refresh NIST glossary (automated weekly)"
          git push

      - name: Log if no changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "NIST glossary is up to date. No changes committed."
